name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  extension:
    name: Extension (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --ci --coverage

      - name: Upload extension dist
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist/
          retention-days: 7

  host:
    name: Host (build + test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build host
        run: dotnet build host/Host.csproj -c Release

      - name: Run unit + integration tests
        run: dotnet test host.tests/Host.Tests.csproj -c Release --logger "trx;LogFileName=results.trx" --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-test-results
          path: host.tests/TestResults/
          retention-days: 7
