<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OneDrive Local Opener — Settings</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 40px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.1rem; margin-bottom: 24px; }
    label { display: block; font-weight: 600; margin: 16px 0 4px; }
    textarea { width: 100%; height: 90px; font-family: monospace; font-size: 0.875rem; padding: 6px; box-sizing: border-box; }
    .toggle-row { display: flex; align-items: center; gap: 10px; }
    .toggle-row label { margin: 0; }
    input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }
    button { margin-top: 20px; padding: 8px 20px; font-size: 0.9rem; cursor: pointer; }
    .saved { color: green; margin-top: 8px; font-size: 0.85rem; }
    .error  { color: red;   margin-top: 8px; font-size: 0.85rem; }
    .managed { font-weight: normal; color: #666; font-size: 0.8rem; }
    textarea:disabled { background: #f5f5f5; color: #777; }
    input:disabled { cursor: not-allowed; opacity: 0.6; }
  </style>
</head>
<body>
  <h1>OneDrive Local Opener — Settings</h1>

  <div class="toggle-row">
    <input type="checkbox" id="enabled">
    <label for="enabled">Enable extension</label>
  </div>

  <label for="includeGlobs">Include patterns (one per line)</label>
  <textarea id="includeGlobs" placeholder="*"></textarea>

  <label for="excludeGlobs">Exclude patterns (one per line)</label>
  <textarea id="excludeGlobs" placeholder="e.g. *.pdf"></textarea>

  <button id="save">Save</button>
  <div id="status" aria-live="polite"></div>

  <script src="dist/options.js"></script>
</body>
</html>
