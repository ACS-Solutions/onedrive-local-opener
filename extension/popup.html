<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OneDrive Local Opener</title>
  <style>
    body { font-family: system-ui, sans-serif; width: 220px; padding: 14px 16px; margin: 0; color: #222; }
    h1 { font-size: 0.9rem; margin: 0 0 14px; }
    .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .toggle-row label { font-size: 0.85rem; }
    input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
    a { font-size: 0.8rem; color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>OneDrive Local Opener</h1>
  <div class="toggle-row">
    <input type="checkbox" id="enabled">
    <label for="enabled">Enable</label>
  </div>
  <a href="#" id="options">Open settings</a>
  <script src="dist/popup.js"></script>
</body>
</html>
